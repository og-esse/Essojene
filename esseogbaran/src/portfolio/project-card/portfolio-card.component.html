<div class="portfolio-card" [class.portfolio-card--featured]="featured">
  <div class="content">
    @if (featured) {
    <span class="feature-pill">Featured Project</span>
    }
    <h2>{{ title }}</h2>
    <p>{{ description }}</p>

    @if (tags.length) {
    <div class="tags">
      <span class="tag" *ngFor="let tag of tags">{{ tag }}</span>
    </div>
    } @if (hasProjectLink || githubUrl || liveUrl) {
    <div class="links">
      @if (isInternalLink) {
      <a [routerLink]="link" [class.primary-cta]="featured">View Project</a>
      } @else if (hasProjectLink) {
      <a
        [href]="link"
        target="_blank"
        rel="noopener noreferrer"
        [class.primary-cta]="featured"
      >
        View Project
      </a>
      } @if (githubUrl) {
      <a [href]="githubUrl" target="_blank" rel="noopener noreferrer">
        GitHub
      </a>
      } @if (liveUrl) {
      <a [href]="liveUrl" target="_blank" rel="noopener noreferrer">
        Live Demo
      </a>
      }
    </div>
    }
  </div>
</div>
