<div class="assistant-container">
  <div class="nav-actions">
    <button type="button" class="nav-link nav-link--back" (click)="goBack()">
      ← Back
    </button>
    <a routerLink="/" class="nav-link">Home</a>
  </div>

  <div class="assistant-toolbar">
    <div class="quick-actions">
      <button
        *ngFor="let action of quickActions"
        type="button"
        class="quick-action"
        [disabled]="loading"
        (click)="useQuickAction(action.prompt)"
      >
        {{ action.label }}
      </button>
    </div>

    <button
      type="button"
      class="escalate-button"
      [disabled]="loading"
      (click)="escalateIssue()"
    >
      Escalate Issue
    </button>
  </div>

  <div class="chat-window">
    <div *ngFor="let msg of messages" class="message" [ngClass]="msg.role">
      {{ msg.content }}
    </div>

    <div *ngIf="loading" class="message assistant">Typing...</div>
  </div>

  <div class="input-bar">
    <input
      [(ngModel)]="input"
      placeholder="Describe your issue..."
      (keyup.enter)="sendMessage()"
    />
    <button type="button" [disabled]="loading" (click)="sendMessage()">
      Send
    </button>
  </div>
</div>
